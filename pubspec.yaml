name: fin_track
description: "Personal money tracking app that works fully offline"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.2
  local_auth: ^2.3.0
  share_plus: ^10.1.4
  crypto: ^3.0.3
  csv: ^6.0.0
  image_picker: ^1.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
